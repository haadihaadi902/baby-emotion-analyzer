<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Emotion Analyzer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #e0f7fa, #e1bee7);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 720px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            font-size: 2.7em;
            color: #6a1b9a;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #666;
            font-size: 1.05em;
            margin-bottom: 30px;
        }

        .upload-box {
            display: block;
            border: 3px dashed #8e24aa;
            background: linear-gradient(135deg, #f3e5f5, #e1f5fe);
            padding: 35px;
            border-radius: 20px;
            cursor: pointer;
            color: #6a1b9a;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 25px;
            transition: 0.3s ease;
        }

        .upload-box:hover {
            background: linear-gradient(135deg, #8e24aa, #42a5f5);
            color: white;
            transform: scale(1.02);
        }

        .upload-icon {
            display: block;
            font-size: 50px;
            margin-bottom: 10px;
        }

        input[type="file"] {
            display: none;
        }

        .analyze-btn {
            border: none;
            background: linear-gradient(135deg, #6a1b9a, #ab47bc);
            color: white;
            padding: 16px 55px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: bold;
        }

        .analyze-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 8px 18px rgba(0,0,0,0.25);
        }

        .note {
            margin-top: 25px;
            color: #555;
            font-size: 0.95em;
            line-height: 1.7;
        }

        #selectedFile {
            margin-top: 15px;
            color: #2c3e50;
            font-weight: bold;
        }

        @media(max-width: 768px) {
            .container {
                margin: 30px 20px;
                padding: 30px;
            }

            h1 {
                font-size: 2.1em;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>👶 Baby Emotion Analyzer</h1>

    <p class="subtitle">
        Upload a baby crying video to analyze cry reason, emotion, confidence, and intensity.
    </p>

    <form method="POST" action="/predict" enctype="multipart/form-data">

        <label class="upload-box" for="videoInput">
            <span class="upload-icon">📹</span>
            <span>Click to Choose Baby Video</span>
        </label>

        <input
            type="file"
            id="videoInput"
            name="video"
            accept="video/*"
            required
        >

        <p id="selectedFile">No video selected</p>

        <button class="analyze-btn" type="submit">
            Analyze Video
        </button>

    </form>

    <p class="note">
        ✅ Baby crying videos accepted <br>
        ❌ Adult crying, shouting, random clips, and non-baby videos will be rejected
    </p>

</div>

<script>
    const videoInput = document.getElementById("videoInput");
    const selectedFile = document.getElementById("selectedFile");

    videoInput.addEventListener("change", function () {
        if (videoInput.files.length > 0) {
            selectedFile.innerText = "Selected: " + videoInput.files[0].name;
        } else {
            selectedFile.innerText = "No video selected";
        }
    });
</script>

</body>
</html>
